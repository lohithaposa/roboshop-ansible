- name: Create ec2-instance and r53 reords
  hosts: all # if not using inventory file 
  connection: local
  vars:
   sg_id: sg-0e79e70f553a77ec9
   ami_id: ami-0220d79f3f480ecf5
   domain_name: daws.88s.online
   env: dev 
   instances: 
    - mongodb
    - catalogue
  tasks:
  - name: Create ec2-instance
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      region: us-east-1
      name: "{{ item }}-{{ env }}"
      tags:
       Project: roboshop
       Environment: "{{ env }}"
       Component: "{{ item }}"
       Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"

  - name: Create route53 record
    amazon.aws.route53:
      state: present
      zone: " {{ domain_name}}"
      record: "{{ item.item }}-{{ env }}-{{ domain_name }}" #mongodb-dev-daws.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: false
      loop: "{{ ec2_output.results }}"

  - name: Create route53 record for front end  
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env}}-{{ domain_name }}"
      type: A 
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: false
      loop: "{{ ec2_output.results }}"
      when:  # and
       - item.item == "frontend"
   # - action == "create"




